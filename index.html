<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Dashboard</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --border-radius: 16px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 32px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .stat-card h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card p {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 280px;
            padding: 14px 20px;
            border-radius: var(--border-radius);
            border: 1px solid transparent;
            background: var(--card-bg);
            box-shadow: var(--shadow);
            font-size: 1rem;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .property-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .property-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .property-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        .property-image-placeholder {
            height: 200px;
            background: #e8e8ed;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .property-content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .property-price {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .property-address {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .property-city {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 16px;
        }

        .property-specs {
            display: flex;
            gap: 16px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            border-top: 1px solid #e8e8ed;
            border-bottom: 1px solid #e8e8ed;
            padding: 12px 0;
            margin-bottom: 16px;
        }

        .property-specs span strong {
            color: var(--text-primary);
        }

        .property-notes {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #424245;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .property-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            background: #e8e8ed;
        }

        .status-badge.active { background: #e3f2fd; color: #0d47a1; }
        .status-badge.pending { background: #fff3e0; color: #e65100; }

        .view-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .view-link:hover {
            text-decoration: underline;
        }

        .loading-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏠 House Dashboard</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Houses</h3>
                <p id="total-count">0</p>
            </div>
            <div class="stat-card">
                <h3>Favorites</h3>
                <p id="fav-count">0</p>
            </div>
        </div>
    </header>

    <div class="property-grid" id="property-display">
        <div class="loading-message">Connecting to Google Sheets...</div>
    </div>
</div>

<script>
    // ⚠️ PASTE YOUR COPIED GOOGLE SPREADSHEET ID BETWEEN THE QUOTES BELOW:
    const SPREADSHEET_ID = '1yx3MSlI6g0k5-r8W4289OPr5MwA9NVXZw4RtH0TcDkM';
    
    // We target the 'Properties' sheet tab and pull the data as a clean CSV format
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=Properties`;

    async function fetchHouses() {
        try {
            const response = await fetch(url);
            const text = await response.text();
            
            // Cleanly parse the CSV data into neat arrays rows
            const rows = text.split('\n').map(row => {
                // Split by commas, cleaning up double quotes Google adds
                return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim());
            });

            // Extract headers from Row 1, and match up the data rows underneath
            const headers = rows[0];
            const dataRows = rows.slice(1);

            const properties = dataRows.map(row => {
                let prop = {};
                headers.forEach((header, index) => {
                    prop[header] = row[index] || '';
                });
                return prop;
            });

            displayProperties(properties);

        } catch (error) {
            console.error("Error fetching sheet data:", error);
            document.getElementById('property-display').innerHTML = `<div class="loading-message">Error loading data. Double-check your Sheet ID and Share settings!</div>`;
        }
    }

    function displayProperties(houses) {
        const displayArea = document.getElementById('property-display');
        
        // Filter out completely blank lines
        const validHouses = houses.filter(h => h.Address);

        if (validHouses.length === 0) {
            displayArea.innerHTML = `<div class="loading-message">No listings found. Add a few homes to your spreadsheet!</div>`;
            return;
        }

        // Calculate and update dashboard stats panel
        document.getElementById('total-count').innerText = validHouses.length;
        const favs = validHouses.filter(h => h.Favorite && h.Favorite.toLowerCase() === 'yes').length;
        document.getElementById('fav-count').innerText = favs;

        // Map data arrays out directly into clean HTML blocks
        displayArea.innerHTML = validHouses.map(house => {
            const statusClass = house.Status ? house.Status.toLowerCase() : 'active';
            
            return `
                <div class="property-card">
                    <div class="property-image-placeholder">🏠 ${house.City || 'Listing'}</div>
                    <div class="property-content">
                        <div class="property-price">${house.Price || 'Contact for Price'}</div>
                        <div class="property-address">${house.Address}</div>
                        <div class="property-city">${house.City || ''}</div>
                        <div class="property-specs">
                            <span><strong>${house.Beds || '-'}</strong> Bed</span>
                            <span><strong>${house.Baths || '-'}</strong> Bath</span>
                            <span><strong>${house.SqFt || '-'}</strong> SqFt</span>
                        </div>
                        <div class="property-notes">${house.Notes || 'No notes added yet.'}</div>
                        <div class="property-actions">
                            <span class="status-badge ${statusClass}">${house.Status || 'Active'}</span>
                            <a href="${house.WebsiteURL || '#'}" class="view-link" target="_blank">Open Listing →</a>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Initialize the live fetch process
    fetchHouses();
</script>

</body>
</html>
