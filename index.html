<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Dashboard</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --border-radius: 16px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 32px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .stat-card h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card p {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .property-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .property-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .property-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        .property-image-wrapper {
            height: 220px;
            width: 100%;
            overflow: hidden;
            background: #e8e8ed;
            position: relative;
        }

        .property-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .property-card:hover .property-image {
            transform: scale(1.03);
        }

        .property-image-placeholder {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 2.5rem;
        }

        .property-content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .property-price {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .property-address {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .property-city {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 16px;
        }

        .property-specs {
            display: flex;
            gap: 16px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            border-top: 1px solid #e8e8ed;
            border-bottom: 1px solid #e8e8ed;
            padding: 12px 0;
            margin-bottom: 16px;
        }

        .property-specs span strong {
            color: var(--text-primary);
        }

        .property-notes {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #424245;
            margin-bottom: 20px;
            flex-grow: 1;
            white-space: pre-line; /* Keeps line breaks clean visually */
        }

        .property-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            background: #e8e8ed;
            text-transform: capitalize;
        }

        .status-badge.active, .status-badge.available { background: #e3f2fd; color: #0d47a1; }
        .status-badge.pending { background: #fff3e0; color: #e65100; }

        .view-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .view-link:hover {
            text-decoration: underline;
        }

        .loading-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏠 House Dashboard</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Houses</h3>
                <p id="total-count">0</p>
            </div>
            <div class="stat-card">
                <h3>Favorites</h3>
                <p id="fav-count">0</p>
            </div>
        </div>
    </header>

    <div class="property-grid" id="property-display">
        <div class="loading-message">Connecting to Google Sheets...</div>
    </div>
</div>

<script>
    const SPREADSHEET_ID = '1yx3MSlI6g0k5-r8W4289OPr5MwA9NVXZw4RtH0TcDkM';
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=Properties`;

    // Smart CSV Parser that handles newlines and commas inside double quotes safely
    function parseCSV(text) {
        let p = '', c = '', r = [];
        let q = false;
        let row = [''];
        
        for (let i = 0; i < text.length; i++) {
            c = text[i];
            let next = text[i+1];
            
            if (c === '"') {
                if (q && next === '"') { row[row.length - 1] += '"'; i++; } // Escaped quotes
                else { q = !q; } // Toggle quote state
            } else if (c === ',' && !q) {
                row.push('');
            } else if ((c === '\r' || c === '\n') && !q) {
                if (c === '\r' && next === '\n') { i++; }
                r.push(row);
                row = [''];
            } else {
                row[row.length - 1] += c;
            }
        }
        if (row.length > 1 || row[0] !== '') { r.push(row); }
        return r;
    }

    async function fetchHouses() {
        try {
            const response = await fetch(url);
            const text = await response.text();
            
            const rows = parseCSV(text);
            if (rows.length === 0) return;

            const headers = rows[0].map(h => h.trim());
            const dataRows = rows.slice(1);

            const properties = dataRows.map(row => {
                let prop = {};
                headers.forEach((header, index) => {
                    prop[header] = row[index] !== undefined ? row[index].trim() : '';
                });
                return prop;
            });

            displayProperties(properties);

        } catch (error) {
            console.error("Error fetching sheet data:", error);
            document.getElementById('property-display').innerHTML = `<div class="loading-message">Error loading data. Double-check your Google Sheet settings!</div>`;
        }
    }

    function displayProperties(houses) {
        const displayArea = document.getElementById('property-display');
        
        // Filter out completely blank lines or headers without an address
        const validHouses = houses.filter(h => h.Address && h.Address !== "");

        if (validHouses.length === 0) {
            displayArea.innerHTML = `<div class="loading-message">No listings found. Add a few homes to your spreadsheet!</div>`;
            return;
        }

        document.getElementById('total-count').innerText = validHouses.length;
        const favs = validHouses.filter(h => h.Favorite && h.Favorite.toLowerCase() === 'yes').length;
        document.getElementById('fav-count').innerText = favs;

        displayArea.innerHTML = validHouses.map(house => {
            const statusClass = house.Status ? house.Status.toLowerCase().replace(/\s+/g, '-') : 'active';
            
            const imageHTML = house.ImageURL && house.ImageURL.startsWith('http') 
                ? `<img src="${house.ImageURL}" class="property-image" alt="${house.Address}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                   <div class="property-image-placeholder" style="display:none;">🏠</div>`
                : `<div class="property-image-placeholder">🏠</div>`;
            
            return `
                <div class="property-card">
                    <div class="property-image-wrapper">
                        ${imageHTML}
                    </div>
                    <div class="property-content">
                        <div class="property-price">${house.Price || 'Contact for Price'}</div>
                        <div class="property-address">${house.Address}</div>
                        <div class="property-city">${house.City || ''}</div>
                        <div class="property-specs">
                            <span><strong>${house.Beds || '-'}</strong> Bed</span>
                            <span><strong>${house.Baths || '-'}</strong> Bath</span>
                            <span><strong>${house.SqFt || '-'}</strong> SqFt</span>
                        </div>
                        <div class="property-notes">${house.Notes || 'No notes added yet.'}</div>
                        <div class="property-actions">
                            <span class="status-badge ${statusClass}">${house.Status || 'Active'}</span>
                            <a href="${house.WebsiteURL || '#'}" class="view-link" target="_blank">Open Listing →</a>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    fetchHouses();
</script>

</body>
</html>
